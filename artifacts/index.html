<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARH Kids Space</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#fafaf7;color:#2c2820;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
h1{font-size:1.8rem;font-weight:800;color:#e07b2a;margin-bottom:6px;text-align:center}
.sub{color:#a89880;font-size:.9rem;margin-bottom:36px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;width:100%;max-width:600px}
.card{background:#fff;border:2px solid #e8e2d6;border-radius:18px;padding:22px 20px;text-decoration:none;color:inherit;transition:.15s;display:block}
.card:hover{border-color:#e07b2a;box-shadow:0 4px 20px rgba(224,123,42,.15);transform:translateY(-2px)}
.card-icon{font-size:2.2rem;margin-bottom:10px}
.card-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.card-desc{font-size:.8rem;color:#a89880;line-height:1.5}
.tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:99px;background:#fef3e8;color:#e07b2a;font-weight:600;margin-top:8px}
.tag.blue{background:#e8f0fe;color:#2e6fcc}
</style>
</head>
<body>
<h1>ARH Kids Space</h1>
<p class="sub">Aflah · Haidar · Asma</p>
<div class="grid">
  <a class="card" href="vak-assessment-v2.html">
    <div class="card-icon">🧠</div>
    <div class="card-title">VAK Assessment</div>
    <div class="card-desc">Kenali gaya belajar anak — Visual, Auditori, atau Kinestetik. Untuk Aflah, Haidar & Asma.</div>
    <span class="tag">Abah & Anak</span>
  </a>
  <a class="card" href="kawan-belajar-v1.html">
    <div class="card-icon">⭐</div>
    <div class="card-title">Kawan Belajar</div>
    <div class="card-desc">Kuiz Islam, hafazan surah, dan aksara Mandarin interaktif.</div>
    <span class="tag blue">Aflah · Haidar</span>
  </a>
</div>
</body>
</html>
